name: Générer article blog

on:
  schedule:
    # Tous les lundis à 7h00 heure de Paris (6h UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Générer l'article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit et push si nouvel article
        run: |
          git config user.name "Tirexe Blog Bot"
          git config user.email "cedric@tirexe.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "blog: article automatique $(date +%Y-%m-%d)"
          git push
